name: Cross-platform oracle metrics (3 runs)
on:
  workflow_dispatch:
jobs:
  oracle-x86:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: 3 judged runs
        run: bash submissions/DistributedBM25/scripts/oracle-3runs.sh
  oracle-arm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: 3 judged runs
        run: bash submissions/DistributedBM25/scripts/oracle-3runs.sh
